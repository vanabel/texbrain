name: deploy to github pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Use Node 24 for JS-based actions (checkout/setup-node/pnpm); see GitHub Actions Node deprecation notices.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # BusyTeX WASM (~175MB) is not in the npm tarball; cache by lockfile so pushes skip re-download when unchanged.
      - uses: actions/cache@v4
        id: busytex-cache
        with:
          path: static/busytex
          key: ${{ runner.os }}-texbrain-busytex-${{ hashFiles('pnpm-lock.yaml') }}
      # Do not use hashFiles(static/busytex/...) — paths under .gitignore may not match, so the step would always re-download
      # or never detect a bad cache. Use a plain filesystem check instead.
      - name: Download BusyTeX assets if missing
        run: |
          if [ -f static/busytex/busytex.js ]; then
            echo "BusyTeX present (restored from cache or repo)."
          else
            echo "BusyTeX missing; downloading..."
            pnpm run download-busytex:force
          fi
        timeout-minutes: 25
        env:
          BUSYTEX_USE_CURL: '1'
      - name: Verify BusyTeX before build
        run: test -f static/busytex/busytex.js
      - run: pnpm build
        env:
          # 仓库 Settings → Variables：自定义部署域名与 GitHub Pages 子路径（见 README「Deploying to GitHub Pages」）
          BASE_PATH: ${{ vars.BASE_PATH }}
          PUBLIC_SITE_ORIGIN: ${{ vars.PUBLIC_SITE_ORIGIN }}
          # Optional: set to `pdfjs` so production uses pdf.js and SyncTeX works in the preview (see README).
          VITE_PDF_VIEWER: ${{ vars.VITE_PDF_VIEWER }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Required on this job so OIDC + Pages API work (see actions/deploy-pages README).
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
